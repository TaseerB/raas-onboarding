# RadSec listener — TCP/TLS port 2083
# RFC 6614: RADIUS over TLS
# Mount at: /etc/freeradius/3.0/radsec-listen.conf

listen {
    type      = auth
    transport = tls
    port      = 2083

    tls {
        private_key_file   = /etc/freeradius/certs/server.key
        certificate_file   = /etc/freeradius/certs/server.pem
        CA_file            = /etc/freeradius/certs/ca.pem
        dh_file            = /etc/freeradius/certs/dh
        cipher_list        = "HIGH:!aNULL:!eNULL:!EXPORT:!RC4:!DES:!3DES:!MD5:!PSK"
        tls_min_version    = "1.3"

        # Require mutual TLS — client must present a cert
        require_client_cert = yes
        verify {
            client              = yes
            check_cert_cn       = no
        }
    }
}
