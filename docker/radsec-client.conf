# RadSec client definition
# RFC 6614 requires the shared secret to be the literal string "radsec"
# Mount at: /etc/freeradius/3.0/clients.conf (append) or include separately

client radsec_client {
    ipaddr          = 127.0.0.1
    proto           = tls
    secret          = radsec
    require_message_authenticator = yes
    nas_type        = other
}
