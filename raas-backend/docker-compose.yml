services:
  postgres:
    image: postgres:16-alpine
    container_name: raas-postgres
    environment:
      POSTGRES_DB: raas
      POSTGRES_USER: raas
      POSTGRES_PASSWORD: raas
    ports:
      - "5432:5432"
    volumes:
      - raas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raas -d raas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  raas_pgdata:
