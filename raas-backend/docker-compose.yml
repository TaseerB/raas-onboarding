services:
  postgres:
    image: postgres:16-alpine
    container_name: raas-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-raas}
      POSTGRES_USER: ${DB_USER:-raas}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - raas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-raas} -d ${DB_NAME:-raas}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  raas_pgdata:
